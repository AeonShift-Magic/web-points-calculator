                        label: 'Unique task ID'
            pointslist:
                create:
                    filename:
                        label: 'Filename'
                    uploadnbcards:
                        label: 'Number of cards in the initial file'
                    title:
                        help: 'The title of your points list'
                        label: 'Title'
                        placeholder: 'My XX/XX/XXXX points list'
                    lastuploadedat:
                        label: 'Last uploaded at'
                    currentnbcards:
                        label: 'Current number of cards in database'
                    relatedupdates:
                        label: 'Related announcements/updates'
                    validitystartingat:
                        help: 'The date from which this list applies, used to find the order and the most recent'
                        label: 'Validity starting at'
                    rulesmodel:
                        label: 'Rules model'
                        help: 'The rules model to apply'
                import:
                    label: >
                        📥 Import/update points list (CSV file)
                    help: >
                        Use this form to update points list from the provided CSV template, one card per line. 
                        <br>
                        <strong>Warning: this will overwrite all current points list and is irreversible.</strong>
                    help2: >
                        Note: our tool checks a minimum of the file integrity before overwriting and normalizes cell contents (case, length, numeric data...), but it is <strong>your responsibility</strong> to care about the content and any lost data.
                    help3: >
                        The CSV file must be in <strong>UTF-8 (Unicode)</strong> format, columns separated by <strong>commas</strong>, and line breaks in <strong>Unix (New Line)</strong> format. 
                        <br>
                        Values may be enclosed in double quotes ("). 
                        <br>
                        One result per line, each position (column "Name (EN)") must be unique and represent <strong> an EXACT card name (checks every character, including: spaces, punctuation, double-face names and case) that exists in source cards database</strong> (line order does not matter). 
                        <br>
                        Points (6 columns)") are integers or decimal numbers (values like "10" or "10.5" are accepted).
                    help4: >
                        The file must contain exactly 5 lines at its top, which will be discarded, and the sixth line MUST have a card named "((unranked))" and sets the points for unranked cards.
                    help5: >
                        <strong>Do not modify the columns, their order, nor add extra columns on the left.</strong>
                    help6: >
                        You can also modify cards individually without re-uploading the entire file by clicking the button on the right of each line in the listing page.
                    help7: >
                        Note: changes are visible in real-time in the admin part ot this website, but public display and calculations may take up to 10 minutes.
                    help8: >
                        The table below shows an example of expected content in your CSV file:
                    confirm:
                        label: 'I confirm I have read and understood the instructions above and wish to import/update the points list.'
                    file:
                        button:
                            label: '📥 Import/update points list (CSV file)'
                            title: 'Import/update points list (CSV file)'
                        error: 'Please select a valid CSV file.'
                        label: '📥 Import/update points list (CSV file)'
                        help: >
                            Import points list from the provided CSV template, one result per line. Maximum size: 4 MB. <br><strong>Warning: this will overwrite all points list cards and is irreversible.</strong>
                        unreadable: 'File is unreadable or empty. Check that it can be opened, is CSV UTF-8 format, commas as separators, Unix line endings.'
                    updated:
                        success: 'Points successfully updated: {number} line(s) updated.'
                    error:
                        filecontents: 'File contents are invalid; please follow the instructions below.'
                        processing_line: 'Error processing line {line_number}: {error}. Please follow the instructions below.'
                        column_count: 'Line does not have the correct number of columns, 7 expected at least'
                        invalid_value: 'Invalid value'
                        invalid_name: 'A card must have the same name as a card that''s in the source card list'
                        invalid_game_points: 'Invalid points (must be an integer between -1000 and 1000)'
                        invalid_first_line: 'The card name in English in the first line MUST be "((unranked))"'
                        incorrectname: 'Incorrect card name: "{name}"'
                        notfoundinsources: 'Card unknown in source cards: "{name}"'
                    info: 'Points Import'
                legends:
                    info: 'Points list details'
            pointslistcard:
                create:
                    pointslist:
                        label: 'Points list'
                        help: 'Which points list to associate this card with'
                        placeholder: 'Please choose a Points List'
                    nameen:
                        label: 'Name (EN)'
                        help: 'The name of the card, in English. Must be character-precise similar to a card in database.'
                    scryfallid:
                        label: 'Scryfall ID'
                        help: 'The Scryfall ID of the card, if needed'
                    scryfalluri:
                        label: 'Scryfall URI'
                        help: 'The Scryfall URI of the card, if needed'
                    manavalue:
                        label: 'Mana Value'
                        help: 'The mana value of the card'
                    oracleid:
                        label: 'Oracle ID'
                        help: 'The Oracle ID of the card'
                    multicztype:
                        label: 'Multiple in Command Zone type'
                        help: 'The type of multiple objects in Command Zones, like "doctors_companion", "choose_a_background", "friends_forever", "partner", "doctors_companion", "choose_a_background".'
                    points2hg:
                        label: 'Two-Headed Giant points'
                        help: 'The points for this card in 2HG variant.'
                    points2hgspecial:
                        label: 'Two-Headed Giant points (special)'
                        help: 'The points for this card in 2HG variant (special, like "As a Commander").'
                    pointsduel:
                        label: 'Duel points'
                        help: 'The points for this card in Duel variant.'
                    pointsduelspecial:
                        label: 'Duel points (special)'
                        help: 'The points for this card in Duel variant (special, like "As a Commander").'
                    pointsmulti:
                        label: 'Multiplayer Free-For-All points'
                        help: 'The points for this card in Multiplayer Free-For-All variant.'
                    pointsmultispecial:
                        label: 'Multiplayer Free-For-All points (special)'
                        help: 'The points for this card in Multiplayer Free-For-All variant (special, like "As a Commander").'
                    islegal2hg:
                        label: 'Legal in 2HG'
                        help: 'Check if the card is legal in Two-Headed Giant'
                    islegal2hgspecial:
                        label: 'Legal in 2HG (special)'
                        help: 'Check if the card is legal in Two-Headed Giant (special, like "As a Commander")'
                    islegalduel:
                        label: 'Legal in Duel'
                        help: 'Check if the card is legal in Duel'
                    islegalduelspecial:
                        label: 'Legal in Duel (special)'
                        help: 'Check if the card is legal in Duel (special, like "As a Commander")'
                    islegalmulti:
                        label: 'Legal in Multiplayer Free-For-All'
                        help: 'Check if the card is legal in Multiplayer Free-For-All points'
                    islegalmultispecial:
                        label: 'Legal in Multiplayer Free-For-All (special)'
                        help: 'Check if the card is legal in Multiplayer Free-For-All points (special, like "As a Commander")'
                    firstline:
                        label: 'The first name in Englisy MUST always be <code class="inline">((unranked))</code> (and defines the points for unranked cards)'
                    isczeligible:
                        label: 'messages'
                legends:
                    info: 'Points List Card details'
            update:
                create:
                    titleen:
                        help: 'The public title of your update/announcement (English)'
                        label: 'Title (EN)'
                        placeholder: 'My new announcement'
                    pointslist:
                        help: 'Which Points List to use'
