                        help: 'Váš commander je hodnocen v aktuálním seznamu bodů.'
                start:
                    label: 'Začněte přidávat karty do decklistu vlevo pomocí našeho formuláře „Přidat kartu“, nebo vložením decklistu z jiného webu do textové oblasti vlevo podle pokynů níže.'
            decklist:
                addcard:
                    label: 'Přidat kartu'
                noresult:
                    label: 'Nebyly nalezeny žádné výsledky.'
        pointslist:
            choice:
                label: '{name} ({datestart} → {dateend})'
            latest:
                label: '{name} (Aktuální seznam)'
        quiz:
            back:
                label: '← Předchozí otázka'
                title: 'Vrátit se na předchozí otázku'
            help:
                text1: 'Pomůžeme vám najít váš formát.'
                text2: 'Stačí odpovědět na těchto 5 rychlých otázek. ↓'
            question1:
                label: 'Hráči/týmy/životy:'
                text: 'Kolik hráčů (týmů) a životů chcete?'
                answer1:
                    label: '2 hráči (Duel)'
                    help: 'Duel hry: dva hráči, dva týmy. <br><strong>20 životů na začátku.</strong>'
                answer2:
                    label: '4 hráči (2 týmy)'
                    help: 'Two-Headed Giant: čtyři hráči, dva týmy po dvou. <br><strong>30 sdílených životů na začátku.</strong> <em class="comingsoon">Již brzy!</em>'
                answer3:
                    label: '4+ hráčů (Free-For-All)'
                    help: 'cEDH/Commander: čtyři a více hráčů, free-for-all. <br><strong>40 životů na začátku.</strong> <em class="comingsoon">Již brzy!</em>'
                answer4:
                    label: '6 hráčů (2 týmy)'
                    help: 'Team Trio: dva týmy po třech hráčích, se speciálními pravidly pro párování. <br><strong>20 životů na začátku.</strong> <em class="comingsoon">Již brzy!</em>'
            question2:
                label: 'Maximální počet kopií karty v decku:'
                text: 'Jaký je maximální počet kopií karty v decku, včetně Command Zones a Sideboardů?'
                answer1:
                    label: 'max. 1 kopie'
                    help: 'Singleton - maximálně jedna kopie každé karty napříč celým decklistem.'
                answer2:
                    label: 'max. 4 kopie'
                    help: 'Quadruples - maximálně čtyři kopie každé karty napříč celým decklistem. <em class="comingsoon">Již brzy!</em>'
            question3:
                label: 'Karty v hlavním balíku/sideboardu:'
                text: 'Kolik karet by měl deck mít (hlavní balík/sideboard)?'
                answer1:
                    label: '100/0'
                    help: '100 karet v hlavním balíku, žádný sideboard.'
                answer2:
                    label: '60+/0-15'
                    help: '60 a více karet v hlavním balíku, 0 až 15 v sideboardu. <em class="comingsoon">Již brzy!</em>'
            question4:
                label: 'Commandeři/Command Zones:'
                text: 'Chcete používat Commandery/Command Zones?'
                answer1:
                    label: 'Ne'
                    help: 'Nebudou kontrolována žádná další pravidla. <em class="comingsoon">Již brzy!</em>'
                answer2:
                    label: 'Ano'
                    help: 'Přidá to speciální pravidla a omezení pro konstrukci decku i hratelnost.'
            question5:
                label: 'Maximální timeline legálnosti:'
                text: 'Jakou maximální timeline legálnosti chcete hrát?'
                answer1:
                    label: 'Printed'
                    help: 'Cokoli máte, pokud je to autentická karta Magic The Gathering™. Zahrnuje všechny kdy vytištěné karty.'
                answer2:
                    label: 'Funny'
                    help: 'Zahrnuje všechny karty Eternal plus zábavné sety.'
                answer3:
                    label: 'Eternal'
                    help: 'Zahrnuje všechny karty z Eternal, víceméně Vintage-tištěné, legální v sankcionovaných turnajích.'
                answer4:
                    label: 'Modern'
                    help: 'Zahrnuje všechny karty, které jsou legální nebo zakázané v Modern. <em class="comingsoon">Již brzy!</em>'
                answer5:
                    label: 'Pioneer'
                    help: 'Zahrnuje všechny karty, které jsou legální nebo zakázané v Pioneer. <em class="comingsoon">Již brzy!</em>'
                answer6:
                    label: 'Standard'
                    help: 'Zahrnuje všechny karty, které jsou legální nebo zakázané v Standard. <em class="comingsoon">Již brzy!</em>'
            question6:
                label: 'P-hodnota:'
                text: 'Jaká je vaše referenční P-hodnota? P-hodnota určuje základní body pro stavbu, před jakýmikoli modulacemi.'
                answer1:
                    label: 'Standard Play'
                    help: 'Toto je výchozí P-hodnota a doporučená hodnota pro většinu hráčů. Použijte ji, pokud nevíte, co zvolit.'
                answer2:
                    label: 'Lite Play'
                    help: 'Toto je konzervativnější P-hodnota; doporučuje se hráčům, kteří chtějí hrát s nižší P-hodnotou, což znamená méně investovaných peněz a menší explozivitu. <em class="comingsoon">Již brzy!</em>'
                answer3:
                    label: 'Power Play'
                    help: 'Toto je agresivnější P-hodnota; doporučuje se hráčům, kteří chtějí hrát s vyšší P-hodnotou, což znamená méně omezení na karty a větší explozivitu. <em class="comingsoon">Již brzy!</em>'
            question7:
                label: 'Použít finanční omezení'
                text: 'Používáte finanční omezení?'
                answer1:
                    label: 'Ne'
                    help: 'Hrajete pouze s originálními kartami (nebo povolujete proxy).'
                answer2:
                    label: 'Ano'
                    help: 'Hrajete pouze s originálními kartami, ale máte finanční limit na decky a chcete k tomu použít naši M-Value. <em class="comingsoon">Již brzy!</em>'
            question8:
                label: 'Kterou aktualizaci seznamu bodů použít:'
                text: 'Která aktualizace seznamu bodů se má použít? Vždy používejte nejnovější, pokud nekontrolujete starší decklisty.'
            previous:
                text: '⬅️ Předchozí otázka'
