                    label: >
                        📥 Importar/actualizar lista de puntos (archivo CSV)
                    help: >
                        Usa este formulario para actualizar la lista de puntos a partir de la plantilla CSV proporcionada, una carta por línea. 
                        <br>
                        <strong>Advertencia: esto sobrescribirá toda la lista de puntos actual y es irreversible.</strong>
                    help2: >
                        Nota: nuestra herramienta comprueba un mínimo de integridad del archivo antes de sobrescribir y normaliza el contenido de las celdas (mayúsculas/minúsculas, longitud, datos numéricos...), pero es <strong>tu responsabilidad</strong> cuidar del contenido y de cualquier dato perdido.
                    help3: >
                        El archivo CSV debe estar en formato <strong>UTF-8 (Unicode)</strong>, con columnas separadas por <strong>comas</strong> y saltos de línea en formato <strong>Unix (New Line)</strong>. 
                        <br>
                        Los valores pueden ir entre comillas dobles ("). 
                        <br>
                        Un resultado por línea; cada posición (columna "Name (EN)") debe ser única y representar <strong>un nombre de carta EXACTO (se comprueba cada carácter, incluyendo: espacios, puntuación, nombres de doble cara y mayúsculas/minúsculas) que exista en la base de datos de cartas fuente</strong> (el orden de las líneas no importa). 
                        <br>
                        Los puntos (6 columnas)") son números enteros o decimales (se aceptan valores como "10" o "10.5").
                    help4: >
                        El archivo debe contener exactamente 5 líneas en la parte superior, que se descartarán, luego 3 líneas para los P-Values en orden (Standard Play, Lite Play, Power Play) y la novena línea DEBE tener una carta llamada "((unranked))" y fija los puntos para las cartas no rankeadas.
                    help5: >
                        <strong>No modifiques las columnas, su orden, ni añadas columnas extra a la izquierda.</strong>
                    help6: >
                        También puedes modificar cartas individualmente sin volver a subir todo el archivo haciendo clic en el botón a la derecha de cada línea en la página de listado.
                    help7: >
                        Nota: los cambios son visibles en tiempo real en la parte de administración de este sitio web, pero la visualización pública y los cálculos pueden tardar hasta 10 minutos.
                    help8: >
                        La tabla de abajo muestra un ejemplo del contenido esperado en tu archivo CSV:
