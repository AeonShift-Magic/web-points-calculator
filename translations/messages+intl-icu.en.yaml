            help:
                text1: 'Let''s help you find your format.'
                text2: 'Just answer these 5 quick questions. ↓'
            question1:
                label: 'Players/teams/life:'
                text: 'How many players (teams) and life points do you want?'
                answer1:
                    label: '2 Players (Duel)'
                    help: 'Duel games: two players, two teams. <br><strong>20 life totals at start.</strong>'
                answer2:
                    label: '4 Players (2 Teams)'
                    help: 'Two-Headed Giant: four players, two teams of two. <br><strong>30 shared life totals at start.</strong> <em class="comingsoon">Coming Soon!</em>'
                answer3:
                    label: '4+ Players (Free-For-All)'
                    help: 'cEDH/Commander: four players and more, free-for-all. <br><strong>40 life totals at start.</strong> <em class="comingsoon">Coming Soon!</em>'
                answer4:
                    label: '6 Players (2 Teams)'
                    help: 'Team Trio: two teams of three players, with special rules for matching. <br><strong>20 life totals at start.</strong> <em class="comingsoon">Coming Soon!</em>'
            question2:
                label: 'Maximum copies of a card in a deck:'
                text: 'What''s the maximum number of copies a card in a deck should have, including Command Zones and Sideboards?'
                answer1:
                    label: '1 copy max.'
                    help: 'Singleton - a maximum of one copy of each card across in the entire decklist.'
                answer2:
                    label: '4 copies max.'
                    help: 'Quadruples - a maximum of four copies of each card across in the entire decklist. <em class="comingsoon">Coming Soon!</em>'
            question3:
                label: 'Cards in main deck/sideboard:'
                text: 'How many cards sould a deck have (main deck/sideboard)?'
                answer1:
                    label: '100/0'
                    help: '100 cards main deck, no sideboard.'
                answer2:
                    label: '60+/0-15'
                    help: '60 cards or more in the main deck, 0 to 15 in a sideboard. <em class="comingsoon">Coming Soon!</em>'
            question4:
                label: 'Commanders/Command Zones:'
                text: 'Do you want to use Commanders/Command Zones?'
                answer1:
                    label: 'No'
                    help: 'No additional rules will be checked. <em class="comingsoon">Coming Soon!</em>'
                answer2:
                    label: 'Yes'
                    help: 'This will add special construction and gameplay rules and restrictions.'
            question5:
                label: 'Maximum legality timeline:'
                text: 'What''s the maximum legality timeline you want to play with?'
                answer1:
                    label: 'Printed'
                    help: 'Whatever you have, as long as it''s an authentic Magic The Gathering™ card. This includes all cards ever printed.'
                answer2:
                    label: 'Funny'
                    help: 'This includes all Eternal card, plus the fun sets.'
                answer3:
                    label: 'Eternal'
                    help: 'Includes all cards from Eternal, more or less Vintage-printed, sanctioned-tournament-legal cards.'
                answer4:
                    label: 'Modern'
                    help: 'Includes all cards that are legal or banned in Modern. <em class="comingsoon">Coming Soon!</em>'
                answer5:
                    label: 'Pioneer'
                    help: 'Includes all cards that are legal or banned in Pioneer. <em class="comingsoon">Coming Soon!</em>'
                answer6:
                    label: 'Standard'
                    help: 'Includes all cards that are legal or banned in Standard. <em class="comingsoon">Coming Soon!</em>'
            question6:
                label: 'P-value:'
                text: 'What''s your reference P-value? The P-value determines the base points for building, before any modulations.'
                answer1:
                    label: 'Standard Play'
                    help: 'This is the default P-value, and the recommended value for most players. Use this if you don''t know what to choose.'
                answer2:
                    label: 'Lite Play'
                    help: 'This is a more conservative P-value, and is recommended for players who want to play with a lower P-value, which means less money invested and less explosiveness. <em class="comingsoon">Coming Soon!</em>'
                answer3:
                    label: 'Power Play'
                    help: 'This is a more aggressive P-value, and is recommended for players who want to play with a higher P-value, which means less limits on cards and explosiveness. <em class="comingsoon">Coming Soon!</em>'
            question7:
                label: 'Apply financial constraints'
                text: 'Are you using financial constraints?'
                answer1:
                    label: 'No'
                    help: 'You''re playing with original cards only (or allowing proxies).'
                answer2:
                    label: 'Yes'
                    help: 'You''playing original cards only, but you have a money constraint on decks, and want to use our M-value for that. <em class="comingsoon">Coming Soon!</em>'
            question8:
                label: 'Point List Update to use:'
                text: 'Which Point List update should be used? Always use the latest one unless checking past decklists.'
            previous:
                text: '⬅️ Previous question'
