                    help: 'cEDH/Commander: cuatro jugadores o más, free-for-all. <br><strong>40 vidas al inicio.</strong> <em class="comingsoon">¡Próximamente!</em>'
                answer4:
                    label: '6 jugadores (2 equipos)'
                    help: 'Team Trio: dos equipos de tres jugadores, con reglas especiales de emparejamiento. <br><strong>20 vidas al inicio.</strong> <em class="comingsoon">¡Próximamente!</em>'
            question2:
                label: 'Copias máximas de una carta en un deck:'
                text: '¿Cuál es el número máximo de copias que puede tener una carta en un deck, incluyendo Command Zones y Sideboards?'
                answer1:
                    label: 'máx. 1 copia'
                    help: 'Singleton - un máximo de una copia de cada carta en toda la decklist.'
                answer2:
                    label: 'máx. 4 copias'
                    help: 'Quadruples - un máximo de cuatro copias de cada carta en toda la decklist. <em class="comingsoon">¡Próximamente!</em>'
            question3:
                label: 'Cartas en deck principal/sideboard:'
                text: '¿Cuántas cartas debe tener un deck (deck principal/sideboard)?'
                answer1:
                    label: '100/0'
                    help: '100 cartas en el deck principal, sin sideboard.'
                answer2:
                    label: '60+/0-15'
                    help: '60 cartas o más en el deck principal, 0 a 15 en el sideboard. <em class="comingsoon">¡Próximamente!</em>'
            question4:
                label: 'Commanders/Command Zones:'
                text: '¿Quieres usar Commanders/Command Zones?'
                answer1:
                    label: 'No'
                    help: 'No se comprobarán reglas adicionales. <em class="comingsoon">¡Próximamente!</em>'
                answer2:
                    label: 'Sí'
                    help: 'Esto añadirá reglas y restricciones especiales de construcción y juego.'
            question5:
                label: 'Timeline máxima de legalidad:'
                text: '¿Cuál es la timeline máxima de legalidad con la que quieres jugar?'
                answer1:
                    label: 'Printed'
                    help: 'Lo que tengas, siempre que sea una carta auténtica de Magic The Gathering™. Esto incluye todas las cartas impresas.'
                answer2:
                    label: 'Funny'
                    help: 'Esto incluye todas las cartas Eternal, más los sets divertidos.'
                answer3:
                    label: 'Eternal'
                    help: 'Incluye todas las cartas de Eternal, más o menos impresas en Vintage, legales en torneos sancionados.'
                answer4:
                    label: 'Modern'
                    help: 'Incluye todas las cartas que son legales o están baneadas en Modern. <em class="comingsoon">¡Próximamente!</em>'
                answer5:
                    label: 'Pioneer'
                    help: 'Incluye todas las cartas que son legales o están baneadas en Pioneer. <em class="comingsoon">¡Próximamente!</em>'
                answer6:
                    label: 'Standard'
                    help: 'Incluye todas las cartas que son legales o están baneadas en Standard. <em class="comingsoon">¡Próximamente!</em>'
            question6:
                label: 'P-value:'
                text: '¿Cuál es tu P-value de referencia? El P-value determina los puntos base para construir, antes de cualquier modulación.'
                answer1:
                    label: 'Standard Play'
                    help: 'Este es el P-value por defecto y el recomendado para la mayoría de jugadores. Úsalo si no sabes cuál elegir.'
                answer2:
                    label: 'Lite Play'
                    help: 'Este es un P-value más conservador y se recomienda a jugadores que quieren jugar con un P-value más bajo, lo que significa menos dinero invertido y menos explosividad. <em class="comingsoon">¡Próximamente!</em>'
                answer3:
                    label: 'Power Play'
                    help: 'Este es un P-value más agresivo y se recomienda a jugadores que quieren jugar con un P-value más alto, lo que significa menos límites en cartas y más explosividad. <em class="comingsoon">¡Próximamente!</em>'
            question7:
