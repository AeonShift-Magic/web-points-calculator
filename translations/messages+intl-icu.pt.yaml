                    label: >
                        📥 Importar/atualizar Lista de Pontos (ficheiro CSV)
                    help: >
                        Use este formulário para atualizar a Lista de Pontos a partir do modelo CSV fornecido, uma carta por linha. 
                        <br>
                        <strong>Aviso: isto irá sobrescrever toda a Lista de Pontos atual e é irreversível.</strong>
                    help2: >
                        Nota: a nossa ferramenta verifica um mínimo de integridade do ficheiro antes de sobrescrever e normaliza o conteúdo das células (maiúsculas/minúsculas, comprimento, dados numéricos...), mas é <strong>da sua responsabilidade</strong> cuidar do conteúdo e de quaisquer dados perdidos.
                    help3: >
                        O ficheiro CSV deve estar no formato <strong>UTF-8 (Unicode)</strong>, com colunas separadas por <strong>vírgulas</strong> e quebras de linha no formato <strong>Unix (New Line)</strong>. 
                        <br>
                        Os valores podem estar entre aspas duplas ("). 
                        <br>
                        Um resultado por linha; cada posição (coluna "Name (EN)") deve ser única e representar <strong>um nome de carta EXATO (verifica cada carácter, incluindo: espaços, pontuação, nomes de dupla face e maiúsculas/minúsculas) que exista na base de dados de cartas fonte</strong> (a ordem das linhas não importa). 
                        <br>
                        Os pontos (6 colunas)") são números inteiros ou decimais (valores como "10" ou "10.5" são aceites).
                    help4: >
                        O ficheiro deve conter exatamente 5 linhas no topo, que serão descartadas, depois 3 linhas de P-Values por ordem (Standard Play, Lite Play, Power Play) e a nona linha DEVE ter uma carta chamada "((unranked))" e define os pontos para cartas não classificadas.
                    help5: >
                        <strong>Não modifique as colunas, a sua ordem, nem adicione colunas extra à esquerda.</strong>
                    help6: >
                        Também pode modificar cartas individualmente sem reenviar o ficheiro inteiro clicando no botão à direita de cada linha na página de listagem.
                    help7: >
                        Nota: as alterações são visíveis em tempo real na parte de administração deste site, mas a exibição pública e os cálculos podem demorar até 10 minutos.
                    help8: >
                        A tabela abaixo mostra um exemplo do conteúdo esperado no seu ficheiro CSV:
                    confirm:
