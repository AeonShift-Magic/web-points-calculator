roles:
    label: 'Rôle(s)/Permission(s) sur ce site :'
    help: 'Définit les permissions de l''utilisateur·ice sur le site. Par exemple, un organisateur·ice peut organiser des évènements, un administrateur·ice peut gérer le site, etc.'
admin:
    account:
        email:
            help: >
                Votre email. Doit être unique. Sera utilisé pour récupérer éventuellement vos accès, communiquer, et visible par les personnes inscrites au évènements que vous créerez, et vous devrez valider cette adresse à chaque fois que vous la changerez. 
                <strong>ATTENTION: TOUS les e-mails seront envoyés à cette adresse. Veuillez vérifier TROIS FOIS avant de remplir/changer cette entrée.</strong>
            label: 'E-mail :'
            placeholder: johnorjane.doe@provider.domain
        roles:
            label: 'Rôle(s)/Permission(s) sur ce site :'
        username:
            help: Votre pseudo sur ce site Web. Doit être unique et ne pas être actuellement utilisé par quelqu'un d'autre.
            label: 'Pseudo:'
            placeholder: JohnDoe84
    customblock:
        editlink:
            label: ✏️ Editer ce bloc ({blockkey})
    form:
        customblock:
            create:
                blockkey:
                    help: Si déjà utilisé, tous les blocs avec les bonne langue et emplacement seront affichés par poids croissant.
                    label: Emplacement du bloc
                    placeholder: Sélectionner un emplacement
                contents:
                    help: |
                        <strong>Attention au HTML et à sa validité</strong> : peut casser l'apparence du site ou ne pas s'afficher correctement.</strong> <br> <strong>Attention : n'oubliez pas qu'il y a un cache d'environ 10 minutes sur tous les blocs du site (pour chaque langue et emplacement).</strong>
                    label: Contenu
                weight:
                    help: Entre -100 et 100. Si déjà utilisé, tous les blocs avec les bonne langue et emplacement seront affichés par poids croissant.
                    label: Poids
                    placeholder: Poids du bloc
        page:
            create:
                contents:
                    help: >
                        <strong>Attention au HTML et à sa validité</strong> : peut casser l'apparence du site ou ne pas s'afficher correctement.</strong>
                    label: Contenu
                language:
                    help: La langue dans laquelle cette page sera affichée.
                    label: Langue
                slug:
                    help: Laisser blanc pour générer automatiquement un slug basé sur le titre.
                    label: Slug
                title:
                    help: Le titre de la page, qui sera affiché dans l'en-tête et dans les résultats de recherche.
                    label: Titre
                weight:
                    help: Entre -100 et 100. Si déjà utilisé, toutes les pages avec les bonne langue et emplacement seront affichées par poids croissant.
                    label: Poids
                zone:
                    help: La zone dans laquelle cette page sera affichée. Par exemple, "header" pour l'en-tête, "footer" pour le pied de page, etc.
                    label: Zone
        user:
