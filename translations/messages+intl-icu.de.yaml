                    help: 'Singleton – maximal eine Kopie jeder Karte im gesamten Decklist.'
                answer2:
                    label: 'max. 4 Kopien'
                    help: 'Quadruples – maximal vier Kopien jeder Karte im gesamten Decklist. <em class="comingsoon">Demnächst!</em>'
            question3:
                label: 'Karten im Hauptdeck/Sideboard:'
                text: 'Wie viele Karten soll ein Deck haben (Hauptdeck/Sideboard)?'
                answer1:
                    label: '100/0'
                    help: '100 Karten im Hauptdeck, kein Sideboard.'
                answer2:
                    label: '60+/0-15'
                    help: '60 oder mehr Karten im Hauptdeck, 0 bis 15 im Sideboard. <em class="comingsoon">Demnächst!</em>'
            question4:
                label: 'Commander/Command Zones:'
                text: 'Möchten Sie Commander/Command Zones verwenden?'
                answer1:
                    label: 'Nein'
                    help: 'Es werden keine zusätzlichen Regeln geprüft. <em class="comingsoon">Demnächst!</em>'
                answer2:
                    label: 'Ja'
                    help: 'Dies fügt besondere Konstruktions- und Gameplay-Regeln sowie Einschränkungen hinzu.'
            question5:
                label: 'Maximale Legalitäts-Timeline:'
                text: 'Welche maximale Legalitäts-Timeline möchten Sie spielen?'
                answer1:
                    label: 'Printed'
                    help: 'Was immer Sie haben, solange es eine authentische Magic The Gathering™-Karte ist. Dies umfasst alle jemals gedruckten Karten.'
                answer2:
                    label: 'Funny'
                    help: 'Dies umfasst alle Eternal-Karten plus die Fun-Sets.'
                answer3:
                    label: 'Eternal'
                    help: 'Umfasst alle Karten aus Eternal, mehr oder weniger Vintage-gedruckte, in sanktionierten Turnieren legale Karten.'
                answer4:
                    label: 'Modern'
                    help: 'Umfasst alle Karten, die in Modern legal oder gebannt sind. <em class="comingsoon">Demnächst!</em>'
                answer5:
                    label: 'Pioneer'
                    help: 'Umfasst alle Karten, die in Pioneer legal oder gebannt sind. <em class="comingsoon">Demnächst!</em>'
                answer6:
                    label: 'Standard'
                    help: 'Umfasst alle Karten, die in Standard legal oder gebannt sind. <em class="comingsoon">Demnächst!</em>'
            question6:
                label: 'P-Wert:'
                text: 'Was ist Ihr Referenz-P-Wert? Der P-Wert bestimmt die Basispunkte fürs Bauen, vor etwaigen Modulationen.'
                answer1:
                    label: 'Standard Play'
                    help: 'Dies ist der Standard-P-Wert und die empfohlene Wahl für die meisten Spieler. Nutzen Sie ihn, wenn Sie unsicher sind.'
                answer2:
                    label: 'Lite Play'
                    help: 'Dies ist ein konservativerer P-Wert und wird Spielern empfohlen, die mit einem niedrigeren P-Wert spielen wollen – das bedeutet weniger investiertes Geld und weniger Explosivität. <em class="comingsoon">Demnächst!</em>'
                answer3:
                    label: 'Power Play'
                    help: 'Dies ist ein aggressiverer P-Wert und wird Spielern empfohlen, die mit einem höheren P-Wert spielen wollen – das bedeutet weniger Einschränkungen bei Karten und mehr Explosivität. <em class="comingsoon">Demnächst!</em>'
            question7:
                label: 'Finanzielle Einschränkungen anwenden'
                text: 'Verwenden Sie finanzielle Einschränkungen?'
                answer1:
                    label: 'Nein'
                    help: 'Sie spielen nur mit Originalkarten (oder erlauben Proxies).'
                answer2:
                    label: 'Ja'
                    help: 'Sie spielen nur mit Originalkarten, haben aber eine finanzielle Begrenzung für Decks und möchten dafür unseren M-Value verwenden. <em class="comingsoon">Demnächst!</em>'
            question8:
                label: 'Zu verwendendes Punkte-Listen-Update:'
                text: 'Welches Punkte-Listen-Update soll verwendet werden? Verwenden Sie immer das neueste, außer Sie prüfen ältere Decklisten.'
            previous:
                text: '⬅️ Vorherige Frage'
