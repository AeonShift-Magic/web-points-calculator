                    label: >
                        📥 Importovat/aktualizovat seznam bodů (CSV soubor)
                    help: >
                        Použijte tento formulář k aktualizaci seznamu bodů podle dodané CSV šablony, jedna karta na řádek. 
                        <br>
                        <strong>Upozornění: tímto se přepíše celý aktuální seznam bodů a operace je nevratná.</strong>
                    help2: >
                        Poznámka: náš nástroj před přepsáním kontroluje minimální integritu souboru a normalizuje obsah buněk (velikost písmen, délku, číselná data...), ale je <strong>vaší odpovědností</strong> dbát na obsah a případnou ztrátu dat.
                    help3: >
                        CSV soubor musí být ve formátu <strong>UTF-8 (Unicode)</strong>, sloupce oddělené <strong>čárkami</strong> a konce řádků ve formátu <strong>Unix (New Line)</strong>. 
                        <br>
                        Hodnoty mohou být uzavřeny do dvojitých uvozovek ("). 
                        <br>
                        Jeden záznam na řádek; každá pozice (sloupec „Name (EN)“) musí být jedinečná a představovat <strong>EXAKTNÍ název karty (kontroluje se každý znak včetně: mezer, interpunkce, názvů oboustranných karet a velikosti písmen) existující v databázi zdrojových karet</strong> (pořadí řádků nehraje roli). 
                        <br>
                        Body (6 sloupců)") jsou celá nebo desetinná čísla (hodnoty jako „10“ nebo „10.5“ jsou přijímány).
                    help4: >
                        Soubor musí mít nahoře přesně 5 řádků, které budou zahozeny, poté 3 řádky P-hodnot v pořadí (Standard Play, Lite Play, Power Play) a devátý řádek MUSÍ obsahovat kartu pojmenovanou „((unranked))“ a nastavuje body pro nehodnocené karty.
                    help5: >
                        <strong>Nemuňte sloupce, jejich pořadí ani nepřidávejte další sloupce vlevo.</strong>
                    help6: >
                        Karty můžete upravovat i jednotlivě bez opětovného nahrání celého souboru kliknutím na tlačítko napravo od každého řádku na stránce výpisu.
                    help7: >
                        Poznámka: změny jsou viditelné v reálném čase v administraci tohoto webu, ale veřejné zobrazení a výpočty mohou trvat až 10 minut.
