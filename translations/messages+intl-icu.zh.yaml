                    help: 'Quadruples - 整个牌表中每张牌最多 4 份。 <em class="comingsoon">即将推出！</em>'
            question3:
                label: '主牌/备牌的卡牌数量：'
                text: '牌组应有多少张卡（主牌/备牌）？'
                answer1:
                    label: '100/0'
                    help: '主牌 100 张，不使用备牌。'
                answer2:
                    label: '60+/0-15'
                    help: '主牌至少 60 张，备牌 0 到 15 张。 <em class="comingsoon">即将推出！</em>'
            question4:
                label: 'Commander/Command Zones：'
                text: '你要使用 Commander/Command Zones 吗？'
                answer1:
                    label: '否'
                    help: '不会检查额外规则。 <em class="comingsoon">即将推出！</em>'
                answer2:
                    label: '是'
                    help: '这将增加构筑与对局的特殊规则与限制。'
            question5:
                label: '最大合法时间线：'
                text: '你想使用哪条最大合法时间线进行游戏？'
                answer1:
                    label: 'Printed'
                    help: '只要是正品 Magic The Gathering™ 卡牌即可，包括所有历史印刷过的卡牌。'
                answer2:
                    label: 'Funny'
                    help: '包含所有 Eternal 卡牌，以及趣味系列。'
                answer3:
                    label: 'Eternal'
                    help: '包含 Eternal 的所有卡牌（大致相当于 Vintage 印刷范围与官方赛事合法牌）。'
                answer4:
                    label: 'Modern'
                    help: '包含 Modern 中合法或被禁的所有卡牌。 <em class="comingsoon">即将推出！</em>'
                answer5:
                    label: 'Pioneer'
                    help: '包含 Pioneer 中合法或被禁的所有卡牌。 <em class="comingsoon">即将推出！</em>'
                answer6:
                    label: 'Standard'
                    help: '包含 Standard 中合法或被禁的所有卡牌。 <em class="comingsoon">即将推出！</em>'
            question6:
                label: 'P-value：'
                text: '你的参考 P-value 是多少？P-value 决定构筑的基础点数（在任何调制项之前）。'
                answer1:
                    label: 'Standard Play'
                    help: '这是默认的 P-value，并推荐给大多数玩家。如果你不确定选什么，就用它。'
                answer2:
                    label: 'Lite Play'
                    help: '更保守的 P-value，推荐给想用更低 P-value 的玩家（投入更少，爆发性更低）。 <em class="comingsoon">即将推出！</em>'
                answer3:
                    label: 'Power Play'
                    help: '更激进的 P-value，推荐给想用更高 P-value 的玩家（限制更少，爆发性更强）。 <em class="comingsoon">即将推出！</em>'
            question7:
                label: '应用财务限制'
                text: '你是否启用财务限制？'
                answer1:
                    label: '否'
                    help: '你只使用原版卡牌（或允许代理卡）。'
                answer2:
                    label: '是'
                    help: '你只使用原版卡牌，但对牌组有金额限制，并希望使用我们的 M-Value。 <em class="comingsoon">即将推出！</em>'
            question8:
                label: '要使用的积分表更新：'
                text: '应使用哪次积分表更新？除非你在核对旧牌表，否则总是使用最新版本。'
            previous:
                text: '⬅️ 上一题'
