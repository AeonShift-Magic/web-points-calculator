                    import:
                        label: 'MTG - Importer les Points pour la Liste "{name}"'
                        title: 'MTG - Importer les Points pour la Liste "{name}"'
                import:
                    columnsright:
                        text:
                    label: >
                        📥 Importer/mettre à jour la liste des points (fichier CSV)
                    help: >
                        Utilisez ce formulaire pour mettre à jour la liste des points à partir du modèle CSV fourni, une carte par ligne.
                        <br>
                        <strong>Attention: cette action écrasera la liste des points actuelle et est irréversible.</strong>
                    help2: >
                        Remarque : notre outil vérifie au minimum l'intégrité du fichier avant de l'écraser et normalise le contenu des cellules (casse, longueur, données numériques...), mais il est de <strong>votre responsabilité</strong> de veiller au contenu et à toute donnée perdue.
                    help3: >
                        Le fichier CSV doit être au format UTF-8 (Unicode), les colonnes séparées par des virgules et les sauts de ligne au format Unix (Nouvelle ligne).
                        <br>
                        Les valeurs peuvent être placées entre guillemets doubles (").
                        <br>
                        Un résultat par ligne. Chaque valeur (colonne "Nom (EN)") doit être unique et représenter un nom de carte EXACT existant (vérifie chaque caractère, y compris : espaces, ponctuation, noms des deux faces et casse) dans la base de données source (l'ordre des lignes n'a pas d'importance).
                        <br>
                        Les points (6 colonnes) sont des entiers ou des nombres décimaux (les valeurs telles que "10" ou "10,5" sont acceptées).
                    help4: >
                        Le fichier doit contenir exactement 5 lignes en haut, qui seront ignorées, puis les lignes de P-Values dans l'ordre (Standard Play, Lite Play, Power Play) et la neuvième ligne DOIT avoir une carte nommée "((unranked))" et définit les points pour les cartes non classées (unranked).
                    help5: >
                        <strong>Ne modifiez pas les colonnes, leur ordre, n'ajoutez pas de colonnes supplémentaires à gauche.</strong>
                    help6: >
                        Vous pouvez également modifier les cartes individuellement sans avoir à télécharger à nouveau le fichier entier en cliquant sur le bouton situé à droite de chaque ligne dans la page de liste.
                    help7: >
                        Remarque : les modifications sont visibles en temps réel dans la partie administration de ce site web, mais l'affichage public et les calculs peuvent prendre jusqu'à 10 minutes.
                    help8: >
                        Le tableau ci-dessous montre un exemple de contenu attendu dans votre fichier CSV :
                    confirm:
                        label: 'Je confirme que j''ai bien lu et compris les instructions ci-dessus et que je souhaite importer/mettre à jour points de la liste.'
                    file:
                        button:
                            label: '📥 Importer/mettre à jour la Liste de Points (fichier CSV)'
                            title: 'Importer/mettre à jour la Liste de Points (fichier CSV)'
                        error: 'Merci de sélectionner un fichier CSV valide.'
                        label: '📥 Importer/mettre à jour la Liste de Points (fichier CSV)'
                        help: >
                            Importer la Liste de Points depuis le modèle de fichier CSV fourni que vous aurez modifié, un résultat par ligne. Taille maximum : 4 Mo. <br><strong>Attention : ceci écrasera tous les cartes à points actuels de la liste et le processus est irréversible.</strong>
                        unreadable: 'Le fichier est illisible ou vide, merci de vérifier que vous pouvez l''ouvrir, qu''il est au format CSV, UTF-8, avec des virgules comme séparateurs de colonnes et des retours à la ligne au format Unix (New Line).'
                    updated:
                        success: 'Points de la liste mis à jour avec succès : {number} résultat(s) mis à jour.'
                    error:
                        filecontents: 'Le contenu du fichier est invalide, merci de vérifier que vous avez bien suivi les instructions ci-dessous.'
                        processing_line: 'Erreur lors du traitement de la ligne {line_number} : {error}. Merci de vérifier que vous avez bien suivi les instructions ci-dessous.'
                        column_count: 'la ligne ne compte pas le bon nombre de colonnes, 7 attendues au moins'
