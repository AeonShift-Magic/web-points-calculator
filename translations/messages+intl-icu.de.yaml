                    label: >
                        📥 Punkte-Liste importieren/aktualisieren (CSV-Datei)
                    help: >
                        Verwenden Sie dieses Formular, um die Punkte-Liste anhand der bereitgestellten CSV-Vorlage zu aktualisieren, eine Karte pro Zeile. 
                        <br>
                        <strong>Warnung: Dies überschreibt die gesamte aktuelle Punkte-Liste und ist irreversibel.</strong>
                    help2: >
                        Hinweis: Unser Tool prüft vor dem Überschreiben ein Mindestmaß an Dateiintegrität und normalisiert Zellinhalte (Groß-/Kleinschreibung, Länge, numerische Daten ...), aber es liegt in <strong>Ihrer Verantwortung</strong>, auf die Inhalte und mögliche Datenverluste zu achten.
                    help3: >
                        Die CSV-Datei muss im Format <strong>UTF-8 (Unicode)</strong> vorliegen, Spalten müssen durch <strong>Kommas</strong> getrennt sein und Zeilenumbrüche im <strong>Unix (New Line)</strong>-Format enthalten. 
                        <br>
                        Werte dürfen in doppelte Anführungszeichen (") eingeschlossen sein. 
                        <br>
                        Ein Ergebnis pro Zeile; jede Position (Spalte „Name (EN)“) muss eindeutig sein und einen <strong>EXAKTEN Kartennamen darstellen (jedes Zeichen wird geprüft, inkl.: Leerzeichen, Satzzeichen, Doppelseiten-Namen und Groß-/Kleinschreibung), der in der Quellkartendatenbank existiert</strong> (die Reihenfolge der Zeilen ist egal). 
                        <br>
                        Punkte (6 Spalten)") sind ganze oder Dezimalzahlen (Werte wie „10“ oder „10.5“ werden akzeptiert).
                    help4: >
                        Die Datei muss oben genau 5 Zeilen enthalten, die verworfen werden, danach 3 Zeilen für P-Werte in dieser Reihenfolge (Standard Play, Lite Play, Power Play) und die neunte Zeile MUSS eine Karte namens „((unranked))“ enthalten und legt die Punkte für ungerankte Karten fest.
                    help5: >
                        <strong>Ändern Sie nicht die Spalten, deren Reihenfolge und fügen Sie keine zusätzlichen Spalten links hinzu.</strong>
                    help6: >
                        Sie können Karten auch einzeln ändern, ohne die gesamte Datei erneut hochzuladen, indem Sie auf der Übersichtsseite rechts neben jeder Zeile auf die Schaltfläche klicken.
                    help7: >
                        Hinweis: Änderungen sind in der Admin-Oberfläche dieser Website in Echtzeit sichtbar, aber die öffentliche Anzeige und Berechnungen können bis zu 10 Minuten dauern.
                    help8: >
                        Die Tabelle unten zeigt ein Beispiel für den erwarteten Inhalt Ihrer CSV-Datei:
                    confirm:
                        label: 'Ich bestätige, dass ich die obigen Anweisungen gelesen und verstanden habe und die Punkte-Liste importieren/aktualisieren möchte.'
                    file:
                        button:
