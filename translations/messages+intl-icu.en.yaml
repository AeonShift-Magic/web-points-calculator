account:
    roles:
        label: 'Role(s)/Permission(s) on this site:'
        help: 'Defines the user''s permissions on the site. For example, an organizer can organize events, an administrator can manage the site, etc.'
admin:
    account:
        email:
            help: >
                Your email. Must be unique. Will be used to recover access, communicate, and visible to people registered for events you create, and you will need to validate this address everytime you change it. 
                <strong>WARNING: ALL emails will be sent to this address. Please triple-check before filling/changing this entry.</strong>
            label: 'Email:'
            placeholder: johnorjane.doe@provider.domain
        roles:
            label: 'Role(s)/Permissions on this site:'
        username:
            help: Your username on this website. Must be unique and not currently used by someone else.
            label: 'Username:'
            placeholder: JohnDoe84
    customblock:
        editlink:
            label: ✏️ Edit this block ({blockkey})
    form:
        customblock:
            create:
                blockkey:
                    help: If already used, all blocks with the correct language and location will be displayed in ascending weight order.
                    label: Block location
                    placeholder: Select a location
                contents:
                    help: |
                        <strong>Be careful with HTML and its validity</strong>: may break site appearance or not display correctly.</strong> <br> <strong>Warning: remember there is about a 10-minute cache on all site blocks (for each language and location).</strong>
                    label: Content
                weight:
                    help: Between -100 and 100. If already used, all blocks with the correct language and location will be displayed in ascending weight order.
                    label: Weight
                    placeholder: Weight of the block
        page:
            create:
                contents:
                    help: >
                        <strong>Be careful with HTML and its validity</strong>: may break site appearance or not display correctly.</strong>
                    label: Content
                language:
                    help: The language in which this page will be displayed.
                    label: Language
                slug:
                    help: Leave blank to automatically generate a slug based on the title.
                    label: Slug
                title:
                    help: The page title, which will be displayed in the header and search results.
                    label: Title
                weight:
                    help: Between -100 and 100. If already used, all pages with the correct language and location will be displayed in ascending weight order.
                    label: Weight
                zone:
                    help: The zone in which this page will be displayed. For example, "header" for header, "footer" for footer, etc.
                    label: Zone
        user:
            create:
                roles:
                    invalid: Please choose valid roles for the user.
                    multipleinvalid: Please choose valid roles for the user.
        abstract:
            update:
                create:
                    titleen:
                        help: 'The public title of your update/announcement (English)'
                        label: 'Title (EN)'
                        placeholder: 'My new announcement'
                    pointslist:
                        help: 'Which points list to use'
                        label: 'Points list to use'
                        placeholder: 'Please select a points list'
                    startingat:
                        help: 'When does this update start being effective?'
                        label: 'Start date'
                    endingat:
                        help: 'When does this update stop being effective?'
                        label: 'End date'
                    descriptionen:
                        label: 'Description (EN)'
                        help: 'Possible complementary details'
                    public:
                        label: 'Public'
                        help: 'Marquer cette mise à jour comme publique'
        mtg:
            cardsourceactivityhistory:
                create:
                    channel:
                        label: 'Channel'
                    startedat:
                        label: 'Started at'
                    endedat:
                        label: 'Ended at'
                    successsummary:
                        label: 'Success summary'
                    errorsummary:
                        label: 'Error summary'
                    startedfrom:
                        label: 'Started from'
                    logfilepath:
                        label: 'Log file'
                    uniqueid:
                        label: 'Unique task ID'
