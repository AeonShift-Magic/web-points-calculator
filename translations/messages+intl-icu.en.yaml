                        help: 'The rules template to apply when using this list'
                    relatedpointslist:
                        label: 'Related Points List(s)'
            sourcecard:
                create:
                    nameen:
                        label: 'Name (EN)'
                        help: 'The name of the card, in English. Must be character-precise.'
                        placeholder: 'Black Lotus...'
                    firstprintsetcode:
