                    label: >
                        📥 ポイントリストをインポート/更新（CSVファイル）
                    help: >
                        このフォームを使って、提供されたCSVテンプレートからポイントリストを更新します（1行につき1カード）。 
                        <br>
                        <strong>警告: これは現在のポイントリスト全体を上書きし、元に戻せません。</strong>
                    help2: >
                        注: 当ツールは上書き前に最低限の整合性チェックを行い、セル内容（大小文字、長さ、数値データなど）を正規化しますが、内容や失われるデータに注意するのは<strong>あなたの責任</strong>です。
                    help3: >
                        CSVファイルは <strong>UTF-8（Unicode）</strong> 形式で、列は <strong>カンマ</strong> で区切り、改行は <strong>Unix（New Line）</strong> 形式である必要があります。 
                        <br>
                        値は二重引用符（"）で囲むことができます。 
                        <br>
                        1行につき1結果。各位置（列 "Name (EN)"）は一意で、<strong>ソースカードDBに存在するカードの正確な名称（スペース、句読点、両面カード名、大小文字を含むすべての文字が一致）</strong>である必要があります（行順は問いません）。 
                        <br>
                        Points（6列）は整数または小数（"10" や "10.5" など）が使用できます。
                    help4: >
                        ファイル先頭には必ず5行があり、それらは破棄されます。その後、P-Values のために3行（Standard Play、Lite Play、Power Play の順）が続き、9行目には必ず "((unranked))" というカードがあり、unrankedカードのポイントを設定します。
                    help5: >
                        <strong>列や列順を変更したり、左側に追加列を増やしたりしないでください。</strong>
                    help6: >
                        一覧ページの各行右側のボタンをクリックすれば、全ファイルを再アップロードせずに個別カードを編集することもできます。
                    help7: >
                        注: 変更は管理画面ではリアルタイムで反映されますが、公開表示と計算への反映には最大10分かかる場合があります。
                    help8: >
                        下の表は、CSVファイルに期待される内容の例を示しています:
                    confirm:
                        label: '上記の手順を読み理解したことを確認し、ポイントリストをインポート/更新します。'
                    file:
                        button:
                            label: '📥 ポイントリストをインポート/更新（CSVファイル）'
                            title: 'ポイントリストをインポート/更新（CSVファイル）'
                        error: '有効なCSVファイルを選択してください。'
                        label: '📥 ポイントリストをインポート/更新（CSVファイル）'
                        help: >
                            提供されたCSVテンプレートからポイントリストをインポート（1行につき1結果）。最大サイズ: 4 MB。 <br><strong>警告: これはポイントリストのカードをすべて上書きし、元に戻せません。</strong>
                        unreadable: 'ファイルが読めないか空です。開けること、CSV UTF-8形式であること、区切りがカンマであること、改行がUnix形式であることを確認してください。'
                    updated:
                        success: 'ポイントを更新しました: {number} 行を処理しました。'
                    error:
                        filecontents: 'ファイル内容が無効です。以下の手順に従ってください。'
