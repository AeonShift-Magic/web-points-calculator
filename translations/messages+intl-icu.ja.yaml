                        invalid_game_points: '無効なポイント（-1000〜1000の整数である必要があります）'
                        invalid_first_line: '最初の行の英語カード名は必ず "((unranked))" でなければなりません'
                        incorrectname: '不正なカード名: "{name}"'
                        notfoundinsources: 'ソースカードに存在しないカード: "{name}"'
                    info: 'ポイントのインポート'
                legends:
                    info: 'ポイントリストの詳細'
