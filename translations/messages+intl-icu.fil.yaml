                    label: >
                        📥 I-import/i-update ang Point List (CSV file)
                    help: >
                        Gamitin ang form na ito para i-update ang Point List mula sa ibinigay na CSV template, isang card kada linya. 
                        <br>
                        <strong>Babala: mao-overwrite nito ang buong kasalukuyang Point List at hindi na ito mababawi.</strong>
                    help2: >
                        Note: sinusuri ng tool namin ang minimum na integridad ng file bago mag-overwrite at ni-no-normalize ang laman ng cells (case, haba, numeric data...), pero <strong>responsibilidad mo</strong> ang pag-aalaga sa content at anumang mawawalang data.
                    help3: >
                        Ang CSV file ay dapat nasa <strong>UTF-8 (Unicode)</strong> format, ang mga column ay hiwalay gamit ang <strong>commas</strong>, at ang line breaks ay nasa <strong>Unix (New Line)</strong> format. 
                        <br>
                        Maaaring ilagay ang values sa loob ng double quotes ("). 
                        <br>
                        Isang resulta kada linya; bawat posisyon (column "Name (EN)") ay dapat natatangi at kumatawan sa <strong>EKSAKTONG pangalan ng card (sinusuri ang bawat karakter, kasama ang: spaces, punctuation, double-face names at case) na umiiral sa source cards database</strong> (hindi mahalaga ang pagkakasunod ng linya). 
                        <br>
                        Ang points (6 columns)") ay mga integer o decimal numbers (tinatanggap ang values tulad ng "10" o "10.5").
                    help4: >
                        Dapat ay may eksaktong 5 linya sa itaas ang file na itatapon, pagkatapos ay 3 linya para sa P-Values sa pagkakasunod (Standard Play, Lite Play, Power Play) at ang ika-siyam na linya ay DAPAT may card na pinangalanang "((unranked))" at ito ang nagtatakda ng points para sa unranked cards.
                    help5: >
                        <strong>Huwag baguhin ang mga column, ang kanilang pagkakasunod, at huwag magdagdag ng extra columns sa kaliwa.</strong>
                    help6: >
                        Maaari mo ring baguhin ang mga card nang paisa-isa nang hindi muling ina-upload ang buong file sa pamamagitan ng pag-click sa button sa kanan ng bawat linya sa listing page.
                    help7: >
                        Note: ang mga pagbabago ay makikita agad sa admin part ng website na ito, pero ang public display at calculations ay maaaring umabot ng hanggang 10 minuto.
                    help8: >
                        Ipinapakita ng table sa ibaba ang isang halimbawa ng inaasahang laman ng CSV file mo:
