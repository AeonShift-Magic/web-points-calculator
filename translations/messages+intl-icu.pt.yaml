                    label: 'Standard'
                    help: 'Inclui todas as cartas que são legais ou banidas em Standard. <em class="comingsoon">Em breve!</em>'
            question6:
                label: 'P-value:'
                text: 'Qual é o seu P-value de referência? O P-value determina os pontos base para construir, antes de quaisquer modulações.'
                answer1:
                    label: 'Standard Play'
                    help: 'Este é o P-value padrão e o recomendado para a maioria dos jogadores. Use-o se não souber o que escolher.'
                answer2:
                    label: 'Lite Play'
                    help: 'Este é um P-value mais conservador e é recomendado para jogadores que querem jogar com um P-value mais baixo, o que significa menos dinheiro investido e menos explosividade. <em class="comingsoon">Em breve!</em>'
                answer3:
                    label: 'Power Play'
                    help: 'Este é um P-value mais agressivo e é recomendado para jogadores que querem jogar com um P-value mais alto, o que significa menos limites nas cartas e mais explosividade. <em class="comingsoon">Em breve!</em>'
            question7:
                label: 'Aplicar restrições financeiras'
                text: 'Está a usar restrições financeiras?'
                answer1:
                    label: 'Não'
                    help: 'Está a jogar apenas com cartas originais (ou a permitir proxies).'
                answer2:
                    label: 'Sim'
                    help: 'Está a jogar apenas com cartas originais, mas tem uma restrição financeira nos decks e quer usar o nosso M-Value para isso. <em class="comingsoon">Em breve!</em>'
            question8:
                label: 'Atualização da Lista de Pontos a usar:'
                text: 'Que atualização da Lista de Pontos deve ser usada? Use sempre a mais recente, a menos que esteja a verificar decklists antigas.'
            previous:
                text: '⬅️ Pergunta anterior'
