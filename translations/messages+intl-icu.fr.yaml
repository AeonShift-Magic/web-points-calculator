                    label: >
                        📥 Importer/mettre à jour la liste de points (fichier CSV)
                    help: >
                        Utilisez ce formulaire pour mettre à jour la liste de points à partir du modèle CSV fourni, une carte par ligne. 
                        <br>
                        <strong>Attention : cela écrasera entièrement la liste de points actuelle et est irréversible.</strong>
                    help2: >
                        Remarque : notre outil vérifie un minimum l’intégrité du fichier avant l’écrasement et normalise le contenu des cellules (casse, longueur, données numériques...), mais il est de <strong>votre responsabilité</strong> de veiller au contenu et aux éventuelles données perdues.
                    help3: >
                        Le fichier CSV doit être au format <strong>UTF-8 (Unicode)</strong>, avec des colonnes séparées par des <strong>virgules</strong>, et des retours à la ligne au format <strong>Unix (New Line)</strong>. 
                        <br>
                        Les valeurs peuvent être entourées de guillemets doubles ("). 
                        <br>
                        Un résultat par ligne, chaque position (colonne "Name (EN)") doit être unique et représenter <strong>un nom de carte EXACT (vérification de chaque caractère, y compris : espaces, ponctuation, noms recto-verso et casse) existant dans la base de données des cartes sources</strong> (l’ordre des lignes n’a pas d’importance). 
                        <br>
                        Les points (6 colonnes)") sont des nombres entiers ou décimaux (des valeurs comme "10" ou "10.5" sont acceptées).
                    help4: >
                        Le fichier doit contenir exactement 5 lignes en tête, qui seront ignorées, puis 3 lignes pour les P-Values dans l’ordre (Standard Play, Lite Play, Power Play) et la neuvième ligne DOIT contenir une carte nommée "((unranked))" et définit les points des cartes non classées.
                    help5: >
                        <strong>Ne modifiez pas les colonnes, leur ordre, et n’ajoutez pas de colonnes supplémentaires à gauche.</strong>
                    help6: >
                        Vous pouvez également modifier les cartes individuellement sans téléverser à nouveau l’intégralité du fichier en cliquant sur le bouton à droite de chaque ligne dans la page de liste.
                    help7: >
                        Remarque : les modifications sont visibles en temps réel dans la partie administration de ce site, mais l’affichage public et les calculs peuvent prendre jusqu’à 10 minutes.
                    help8: >
                        Le tableau ci-dessous montre un exemple du contenu attendu dans votre fichier CSV :
