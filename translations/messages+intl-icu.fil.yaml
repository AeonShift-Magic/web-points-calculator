            question4:
                label: 'Commanders/Command Zones:'
                text: 'Gusto mo bang gumamit ng Commanders/Command Zones?'
                answer1:
                    label: 'Hindi'
                    help: 'Walang karagdagang rules ang iche-check. <em class="comingsoon">Parating na!</em>'
                answer2:
                    label: 'Oo'
                    help: 'Magdadagdag ito ng special construction at gameplay rules at restrictions.'
            question5:
                label: 'Maximum legality timeline:'
                text: 'Ano ang maximum legality timeline na gusto mong laruin?'
