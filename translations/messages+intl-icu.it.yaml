                    label: >
                        📥 Importa/aggiorna lista punti (file CSV)
                    help: >
                        Usa questo modulo per aggiornare la lista punti dal template CSV fornito, una carta per riga. 
                        <br>
                        <strong>Avviso: questo sovrascriverà l’intera lista punti attuale ed è irreversibile.</strong>
                    help2: >
                        Nota: il nostro strumento verifica un minimo di integrità del file prima di sovrascrivere e normalizza i contenuti delle celle (maiuscole/minuscole, lunghezza, dati numerici...), ma è <strong>tua responsabilità</strong> controllare i contenuti e le eventuali perdite di dati.
                    help3: >
                        Il file CSV deve essere in formato <strong>UTF-8 (Unicode)</strong>, con colonne separate da <strong>virgole</strong> e interruzioni di riga in formato <strong>Unix (New Line)</strong>. 
                        <br>
                        I valori possono essere racchiusi tra doppi apici ("). 
                        <br>
                        Un risultato per riga; ogni posizione (colonna "Name (EN)") deve essere unica e rappresentare <strong>un nome carta ESATTO (viene controllato ogni carattere, inclusi: spazi, punteggiatura, nomi di carte bifronte e maiuscole/minuscole) presente nel database delle carte sorgente</strong> (l’ordine delle righe non importa). 
                        <br>
                        I punti (6 colonne)") sono numeri interi o decimali (sono accettati valori come "10" o "10.5").
                    help4: >
                        Il file deve contenere esattamente 5 righe in cima, che verranno scartate, poi 3 righe per i P-Values in ordine (Standard Play, Lite Play, Power Play) e la nona riga DEVE avere una carta chiamata "((unranked))" e imposta i punti per le carte non classificate.
                    help5: >
                        <strong>Non modificare le colonne, il loro ordine, né aggiungere colonne extra a sinistra.</strong>
                    help6: >
                        Puoi anche modificare le carte singolarmente senza ricaricare l’intero file cliccando sul pulsante a destra di ogni riga nella pagina di elenco.
                    help7: >
                        Nota: le modifiche sono visibili in tempo reale nella parte admin di questo sito, ma la visualizzazione pubblica e i calcoli possono richiedere fino a 10 minuti.
                    help8: >
                        La tabella qui sotto mostra un esempio del contenuto atteso nel tuo file CSV:
                    confirm:
                        label: 'Confermo di aver letto e compreso le istruzioni sopra e desidero importare/aggiornare la lista punti.'
