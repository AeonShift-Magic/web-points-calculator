##############################################################
######################## AeonShift CI ########################
##############################################################
name: AeonShift Github CI - Electron Build App

# We don't create releases nor uses Git tags in this project,
# so we just use 'latest' as a static tag for the release action.
# This way, the latest build is always available under the 'latest' release.
# As the application is always "perpetual" as a versioned state.
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

env:
    APP_ENV: github

permissions:
    contents: write

jobs:
    ##############################################################
    #################### ElectronJS App Build ####################
    ##############################################################
    electron_build:
        name: AeonShift Github CI - Electron Build App

        strategy:
            fail-fast: false
            matrix:
                os: [ ubuntu-latest, macos-latest, windows-latest ]

        runs-on: ${{ matrix.os }}

        steps:
            # ---- Checkout Repository ----
            -   name: Checkout repository
                uses: actions/checkout@v4

            # ---- Node Setup ----
            -   name: Setup Node
                uses: actions/setup-node@v4
                with:
                    node-version: 24

            # ---- Build Symfony assets & Twig output ----
            -   name: Install PHP / Composer
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'
                    extensions: zip, intl, mbstring, pdo_mysql

            # -- Install Composer dependencies ----
            -   name: Install Composer deps
                run: composer install --no-interaction

            # ---- Warm up Symfony caches ----
            -   name: Warm Symfony cache for env Dev
                run: php bin/console cache:warmup --env=dev -vvv --no-optional-warmers

            -   name: Warm Symfony cache for env Github
                run: php bin/console cache:warmup --env=github -vvv --no-optional-warmers

            # ---- Render the calculator assets to the correct output directory in /public ----
            -   name: Render Twig output
                run: php bin/console aeonshift:mtg:builder:staticassets:v1

            # ---- Install JS dependencies (importmap must be dumped beforehand) ----
            -   name: Install JS deps for Importmap
                run: |
                    npm install -g esbuild
                    php bin/console importmap:install

            # ---- Build Electron deps ----
            -   name: Install Dependencies
                run: npm ci

            -   name: Make Electron App
                run: npm run mtg-electron-make

            # ---- Upload platform-specific build artifacts ----
            -   name: Upload Artifacts
                uses: actions/upload-artifact@v4
                with:
                    name: build-${{ matrix.os }}
                    path: out/**
                    if-no-files-found: error

            # ---- Replace GitHub Release with all platform builds ----
            -   name: Replace Github Releases
                uses: softprops/action-gh-release@v1
                if: github.ref == 'refs/heads/main'
                with:
                    tag_name: latest
                    name: Latest Version of AeonShift Calculator App
                    prerelease: false
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
