##############################################################
##################### AeonShift AV Scan ######################
##############################################################
name: antivirus-scan-on-release

permissions:
    contents: read

on:
    release:
        types:
            - published

jobs:
    ##############################################################
    ################### VirusTotal Remote Scan ###################
    ##############################################################
    virustotal:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            -
                name: VirusTotal AeonShift Scan
                uses: crazy-max/ghaction-virustotal@v4
                with:
                    vt_api_key: ${{ secrets.VT_API_KEY }}
                    update_release_body: true
                    files: |
                        .exe$
