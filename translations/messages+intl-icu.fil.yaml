                    label: 'Printed'
                    help: 'Kung ano man ang meron ka, basta authentic Magic The Gathering™ card. Kasama dito ang lahat ng cards na na-print na.'
                answer2:
                    label: 'Funny'
                    help: 'Kasama dito ang lahat ng Eternal cards, plus ang fun sets.'
                answer3:
                    label: 'Eternal'
                    help: 'Kasama ang lahat ng cards mula Eternal, karamihan ay Vintage-printed, sanctioned-tournament-legal cards.'
                answer4:
                    label: 'Modern'
                    help: 'Kasama ang lahat ng cards na legal o banned sa Modern. <em class="comingsoon">Parating na!</em>'
                answer5:
                    label: 'Pioneer'
                    help: 'Kasama ang lahat ng cards na legal o banned sa Pioneer. <em class="comingsoon">Parating na!</em>'
                answer6:
                    label: 'Standard'
                    help: 'Kasama ang lahat ng cards na legal o banned sa Standard. <em class="comingsoon">Parating na!</em>'
            question6:
                label: 'P-value:'
                text: 'Ano ang reference P-value mo? Ang P-value ang nagtatakda ng base points para sa pagbuo, bago ang anumang modulations.'
                answer1:
                    label: 'Standard Play'
                    help: 'Ito ang default na P-value at rekomendadong value para sa karamihan. Gamitin ito kung hindi mo alam ang pipiliin.'
                answer2:
                    label: 'Lite Play'
                    help: 'Mas conservative na P-value ito, at inirerekomenda sa gustong maglaro gamit ang mas mababang P-value—ibig sabihin mas kaunting pera ang invested at mas kaunting explosiveness. <em class="comingsoon">Parating na!</em>'
                answer3:
                    label: 'Power Play'
                    help: 'Mas aggressive na P-value ito, at inirerekomenda sa gustong maglaro gamit ang mas mataas na P-value—ibig sabihin mas kaunting limit sa cards at mas maraming explosiveness. <em class="comingsoon">Parating na!</em>'
            question7:
                label: 'I-apply ang financial constraints'
                text: 'Gumagamit ka ba ng financial constraints?'
                answer1:
