                    label: >
                        📥 导入/更新积分表（CSV 文件）
                    help: >
                        使用此表单从提供的 CSV 模板更新积分表，每行一张牌。 
                        <br>
                        <strong>警告：这将覆盖当前全部积分表内容且不可逆。</strong>
                    help2: >
                        注：我们的工具在覆盖前会进行最低限度的文件完整性检查，并规范化单元格内容（大小写、长度、数字数据等），但内容正确性与任何数据丢失<strong>由你负责</strong>。
                    help3: >
                        CSV 文件必须为 <strong>UTF-8（Unicode）</strong> 格式，列以 <strong>逗号</strong> 分隔，换行为 <strong>Unix（New Line）</strong> 格式。 
                        <br>
                        值可以用双引号（"）包裹。 
                        <br>
                        每行一个结果；每个位置（“Name (EN)” 列）必须唯一，并代表<strong>源卡牌数据库中存在的“精确”卡名（逐字符校验，包括：空格、标点、双面卡名与大小写）</strong>（行顺序不重要）。 
                        <br>
                        Points（6 列）为整数或小数（可接受 “10” 或 “10.5” 等）。
                    help4: >
                        文件顶部必须正好有 5 行（会被丢弃），随后按顺序提供 3 行 P-Values（Standard Play、Lite Play、Power Play），第 9 行必须包含名为 “((unranked))” 的卡牌，用于设置 unranked 卡的点数。
                    help5: >
                        <strong>不要修改列、列顺序，也不要在左侧添加额外列。</strong>
                    help6: >
                        你也可以在列表页点击每行右侧按钮，逐张修改卡牌，而无需重新上传整个文件。
                    help7: >
                        注：更改在后台管理区实时可见，但公开显示与计算可能最多需要 10 分钟。
                    help8: >
                        下表展示了 CSV 文件期望内容的示例：
