security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\Authenticator
            logout:
                path: /logout
                target: front_index
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                always_remember_me: true

    access_control:
        - { path: ^/(%app.supported_locales_route_requirement%)/admin/custom-block, roles: ROLE_ADMIN }
        - { path: ^/(%app.supported_locales_route_requirement%)/admin/page, roles: ROLE_ADMIN }
        - { path: ^/(%app.supported_locales_route_requirement%)/admin/user, roles: ROLE_ADMIN }
        - { path: ^/(%app.supported_locales_route_requirement%)/admin/mtg, roles: ROLE_MTG_MANAGER }
        - { path: ^/(%app.supported_locales_route_requirement%)/admin, roles: ROLE_MANAGER }
    role_hierarchy:
        ROLE_ADMIN: ROLE_MTG_MANAGER
        ROLE_MTG_MANAGER: ROLE_MANAGER
        ROLE_MANAGER: ROLE_USER

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
