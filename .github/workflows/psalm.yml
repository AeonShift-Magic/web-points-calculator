##############################################################
######################## AeonShift CI ########################
##############################################################
name: AeonShift Github CI - Psalm Validation

# We don't create releases nor uses Git tags in this project,
# so we just use 'latest' as a static tag for the release action.
# This way, the latest build is always available under the 'latest' release.
# As the application is always "perpetual" as a versioned state.
on:
    push:
        branches:
            - main
    pull_request:

env:
    APP_ENV: github

jobs:
    ##############################################################
    #################### PHP Static Analysis #####################
    ##############################################################
    php_quality:
        name: AeonShift Github CI - Psalm Validation
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4

            # ---- PHP Setup ----
            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'
                    extensions: mbstring, intl, pdo_mysql
                    coverage: none

            # -- Install Composer dependencies ----
            -   name: Install Composer dependencies
                run: composer install --no-interaction --prefer-dist --no-scripts

            # ---- Warm up Symfony caches ----
            -   name: Warm Symfony cache for env Dev
                run: php bin/console cache:warmup --env=dev

            -   name: Warm Symfony cache for env Github
                run: php bin/console cache:warmup --env=github

            # ---- Psalm ----
            -   name: Run Psalm Using Embedded Configuration
                run: vendor/bin/psalm --no-progress
