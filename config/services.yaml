parameters:
    app.default_locale: 'en'
    app.table_prefix: 'as_'
    app.supported_locales: ['en', 'fr']
    app.supported_locales_route_requirement: 'en|fr'
    # ----
    escaped_default_share_text: 'AeonShiftPoints Calculator - %globals_website_subtitle%'
    globals_website_subtitle: 'Automatic calculation of your AeonShift points and validation.'
    globals_website_title_suffix: ' | AeonShift Points Calculator'
    globals_website_url: 'https://points.mtgdc.info'
    globals_website_name: 'AeonShiftPoints Calculator'
    globals_website_description: 'Automatic calculation of your AeonShift points and validation.'
    globals_facebook_app_id: '160828815182734'
    # ----
    user_photos_http_path: '/uploads/users/pictures/'
    user_pictures_directory: '%kernel.project_dir%/public%user_photos_http_path%'
    # ----
    scryfall.bulk_api_url: 'https://api.scryfall.com/bulk-data'
    scryfall.cards_source_dir: 'cardsources/scryfall/defaultmtgcards'
    scryfall.bulk_data_type: 'default_cards'
    # ----
    app.mtg_source_download_command: 'aeonshift:mtg:sourcedownload:scryfalldefaultmtgcards:v1'
    app.mtg_db_update_command: 'aeonshift:mtg:updatedb:scryfalldefaultmtgcards:v1'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $projectDir: '%kernel.project_dir%'
            $scryfallBulkApiUrl: '%scryfall.bulk_api_url%'
            $cardsSourceDir: '%scryfall.cards_source_dir%'
            $bulkDataType: '%scryfall.bulk_data_type%'
            $tablePrefix: '%app.table_prefix%'
            $scryfallCardsSourceDir: '%scryfall.cards_source_dir%'
            $MTGSourceDownloadCommand: '%app.mtg_source_download_command%'
            $MTGDBUpdateCommand: '%app.mtg_db_update_command%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    doctrine.table.prefix:
        arguments:
            $prefix: '%app.table_prefix%'
        class: App\EventListener\DoctrineTablePrefixListener
        tags:
            - { name: doctrine.event_listener, event: loadClassMetadata, method: loadClassMetadata }
